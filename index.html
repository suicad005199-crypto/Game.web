<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Crypto Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --slate-blue: #708090; }
        body { background-color: #f8fafc; font-family: -apple-system, sans-serif; padding-bottom: 100px; }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .slate-bg { background-color: var(--slate-blue); }
        .slate-text { color: var(--slate-blue); }
        .modal { display: none; background: rgba(0,0,0,0.5); }
        .modal.active { display: flex; }
    </style>
</head>
<body>

    <header class="slate-bg text-white p-6 rounded-b-[30px] shadow-lg safe-top">
        <p class="text-xs opacity-80">總資產估值 (USDT)</p>
        <h1 id="totalBalance" class="text-3xl font-bold mt-1">0.00</h1>
    </header>

    <main id="tradeList" class="p-4 space-y-3">
        <p id="emptyHint" class="text-center text-gray-400 mt-10">尚無交易紀錄，請點擊下方新增</p>
    </main>

    <div id="modal" class="modal fixed inset-0 z-50 items-end justify-center">
        <div class="bg-white w-full rounded-t-[25px] p-6 animate-slide-up">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold slate-text">新增合約交易</h2>
                <button onclick="toggleModal()" class="text-gray-400 text-2xl">&times;</button>
            </div>
            
            <div class="space-y-4 mb-8">
                <div class="grid grid-cols-2 gap-3">
                    <input id="symbol" type="text" placeholder="幣種 (如 BTC)" class="bg-gray-100 p-4 rounded-xl outline-none w-full">
                    <select id="side" class="bg-gray-100 p-4 rounded-xl outline-none">
                        <option value="Long">做多 (Long)</option>
                        <option value="Short">做空 (Short)</option>
                    </select>
                </div>
                <input id="entryPrice" type="number" placeholder="開倉價格" class="bg-gray-100 p-4 rounded-xl outline-none w-full">
                <div class="grid grid-cols-2 gap-3">
                    <input id="leverage" type="number" placeholder="槓桿 (倍)" class="bg-gray-100 p-4 rounded-xl outline-none w-full">
                    <input id="margin" type="number" placeholder="保證金 (USDT)" class="bg-gray-100 p-4 rounded-xl outline-none w-full">
                </div>
            </div>
            
            <button onclick="addTrade()" class="slate-bg text-white w-full py-4 rounded-2xl font-bold text-lg shadow-lg">確認儲存</button>
        </div>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t flex justify-around items-center py-3 pb-8 px-6">
        <button class="flex flex-col items-center slate-text">
            <span class="text-xs font-medium">資產清單</span>
        </button>
        
        <button onclick="toggleModal()" class="slate-bg text-white w-14 h-14 rounded-full flex items-center justify-center shadow-xl -mt-12 border-4 border-[#f8fafc]">
            <span class="text-2xl">+</span>
        </button>

        <button class="flex flex-col items-center text-gray-400">
            <span class="text-xs font-medium">數據分析</span>
        </button>
    </footer>

    <script>
        // 切換彈窗
        function toggleModal() {
            document.getElementById('modal').classList.toggle('active');
        }

        // 新增紀錄邏輯
        function addTrade() {
            const symbol = document.getElementById('symbol').value.toUpperCase();
            const side = document.getElementById('side').value;
            const entry = document.getElementById('entryPrice').value;
            const lev = document.getElementById('leverage').value;
            const margin = document.getElementById('margin').value;

            if(!symbol || !entry || !margin) return alert('請填寫完整資訊');

            const sideColor = side === 'Long' ? 'text-green-500' : 'text-red-500';
            const sideBg = side === 'Long' ? 'bg-green-100' : 'bg-red-100';
            
            const card = `
                <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 ${side === 'Long' ? 'border-green-500' : 'border-red-500'}">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-bold text-gray-800">${symbol}USDT</span>
                        <span class="text-[10px] ${sideBg} ${sideColor} px-2 py-0.5 rounded-full font-bold">${side} ${lev}x</span>
                    </div>
                    <div class="grid grid-cols-2 text-sm">
                        <div class="text-gray-400 text-xs leading-relaxed">開倉價格<br><span class="text-gray-700 font-medium">${entry}</span></div>
                        <div class="text-gray-400 text-xs leading-relaxed text-right">保證金<br><span class="text-gray-700 font-medium">${margin} USDT</span></div>
                    </div>
                </div>
            `;

            document.getElementById('tradeList').insertAdjacentHTML('afterbegin', card);
            document.getElementById('emptyHint').style.display = 'none';
            
            // 更新總計 (簡化邏輯)
            const currentTotal = parseFloat(document.getElementById('totalBalance').innerText);
            document.getElementById('totalBalance').innerText = (currentTotal + parseFloat(margin)).toFixed(2);

            toggleModal(); // 關閉彈窗
            clearForm();   // 清空輸入
        }

        function clearForm() {
            ['symbol', 'entryPrice', 'leverage', 'margin'].forEach(id => document.getElementById(id).value = '');
        }
    </script>
</body>
</html>
