<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>翻倉交易管理 v4</title>
<style>
body { font-family: Arial, sans-serif; margin:0; background:#f0f0f0; color:#333; padding:10px; }
h2 { text-align:center; color:#ff6600; margin-bottom:10px; }

#balance { font-size:18px; font-weight:bold; text-align:center; margin-bottom:12px; }

.panel { background:#fff; border-radius:12px; padding:12px; margin-bottom:10px; box-shadow:0 2px 6px rgba(0,0,0,0.15); }

.form-row { display:flex; flex-direction:column; margin-bottom:10px; gap:5px; }
@media(min-width:600px){ .form-row{ flex-direction:row; gap:10px;} }

input, select, button { padding:10px; font-size:16px; border-radius:6px; border:1px solid #ccc; }
button { background:#ff6600; color:#fff; font-weight:bold; cursor:pointer; border:none; }
button:hover { opacity:0.9; }

.card { background:#fff; border-radius:10px; padding:10px; margin-bottom:8px; box-shadow:0 1px 4px rgba(0,0,0,0.1); }
.card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.card-body { display:flex; flex-direction:column; gap:4px; }

.log-box { background:#111; color:#0f0; padding:10px; height:150px; overflow-y:auto; border-radius:10px; font-family:monospace; font-size:14px; }
</style>
</head>
<body>

<h2>翻倉交易管理 v4</h2>
<div id="balance">帳戶資金: 61.5900 USDT</div>

<!-- Panel1: 資料輸入區 -->
<div class="panel" id="panel1">
    <h3>資料輸入區</h3>
    <div class="form-row">
        <input type="text" id="symbol" placeholder="幣種/合約 (例如 AAVEUSDT.P)">
        <select id="side">
            <option value="多">多</option>
            <option value="空">空</option>
        </select>
        <input type="number" id="leverage" placeholder="槓桿">
    </div>
    <div class="form-row">
        <input type="number" step="any" id="entry" placeholder="進場價">
        <input type="number" step="any" id="stoploss" placeholder="止損價">
        <input type="number" step="any" id="takeprofit" placeholder="止盈價">
    </div>
    <div class="form-row">
        <input type="number" id="capitalRatio" placeholder="投入資金比例 0-100%" step="any">
    </div>
    <button onclick="addTrade()">新增交易</button>
</div>

<!-- Panel2: 顯示交易紀錄 -->
<div class="panel" id="panel2">
    <h3>交易紀錄</h3>
    <div id="tradeList"></div>
</div>

<!-- Log Box -->
<div class="panel">
    <h3>Log Box</h3>
    <div id="logBox" class="log-box"></div>
</div>

<script>
let accountBalance = 61.59;
let tradeCount = 0;

function updateBalanceDisplay(){
    document.getElementById("balance").textContent = `帳戶資金: ${accountBalance.toFixed(4)} USDT`;
}

function logMessage(msg){
    const logBox = document.getElementById("logBox");
    const timestamp = new Date().toLocaleTimeString();
    logBox.innerHTML += `[${timestamp}] ${msg}\n`;
    logBox.scrollTop = logBox.scrollHeight;
}

function addTrade(){
    const symbol = document.getElementById("symbol").value.trim();
    const side = document.getElementById("side").value;
    const leverage = parseFloat(document.getElementById("leverage").value);
    const entry = parseFloat(document.getElementById("entry").value);
    const stoploss = parseFloat(document.getElementById("stoploss").value);
    const takeprofit = parseFloat(document.getElementById("takeprofit").value);
    const capitalRatio = parseFloat(document.getElementById("capitalRatio").value);

    if(!symbol || isNaN(leverage)||isNaN(entry)||isNaN(stoploss)||isNaN(takeprofit)||isNaN(capitalRatio)){
        alert("請填寫完整資料");
        return;
    }

    let investedCapital = accountBalance * (capitalRatio/100);
    accountBalance -= investedCapital;
    updateBalanceDisplay();
    tradeCount +=1;
    logMessage(`新增交易 #${tradeCount} ${symbol} | ${side} | 槓桿:${leverage} | 投入資金:${investedCapital.toFixed(4)} USDT`);

    const tradeList = document.getElementById("tradeList");
    const card = document.createElement("div");
    card.className="card";
    card.innerHTML=`
        <div class="card-header">
            <div><strong>#${tradeCount} ${symbol}</strong> | ${side} | ${leverage}X</div>
            <select onchange="updateStatus(this)">
                <option value="進行中">進行中</option>
                <option value="已結束">已結束</option>
            </select>
        </div>
        <div class="card-body">
            <div>進場: ${entry} | 止損: ${stoploss} | 止盈: ${takeprofit}</div>
            <div>
                <input type="number" step="any" placeholder="實際出場價" onchange="closeTrade(this, ${investedCapital}, ${entry}, '${side}')">
            </div>
            <div>投入資金: ${investedCapital.toFixed(4)} USDT</div>
            <div>實際盈虧: <span class="profit">0</span> USDT</div>
        </div>
    `;
    tradeList.appendChild(card);

    ["symbol","leverage","entry","stoploss","takeprofit","capitalRatio"].forEach(id=>document.getElementById(id).value="");
}

function updateStatus(select){
    const card = select.closest(".card");
    // 可擴充
}

function closeTrade(input, investedCapital, entryPrice, side){
    const exitPrice = parseFloat(input.value);
    if(isNaN(exitPrice)) return;
    let profit = 0;
    if(side==="多"){
        profit = (exitPrice - entryPrice)/entryPrice * investedCapital;
    } else {
        profit = (entryPrice - exitPrice)/entryPrice * investedCapital;
    }
    accountBalance += investedCapital + profit;
    updateBalanceDisplay();
    const card = input.closest(".card");
    card.querySelector(".profit").textContent = profit.toFixed(4);
    input.disabled = true;
    logMessage(`交易結束 #${card.querySelector("strong").textContent} | 實際盈虧: ${profit.toFixed(4)} USDT`);
}
</script>

</body>
</html>
