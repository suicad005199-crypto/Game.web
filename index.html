<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>翻倉交易紀錄</title>
<style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #333; padding: 8px; text-align: center; }
    th { background-color: #f2f2f2; }
    input, select { padding: 5px; margin: 3px; }
    .form-row { margin-bottom: 10px; }
</style>
</head>
<body>

<h2>翻倉交易紀錄填寫</h2>

<div id="form">
    <div class="form-row">
        幣種/合約: <input type="text" id="symbol" placeholder="例如 AAVEUSDT.P">
        方向: 
        <select id="side">
            <option value="多">多</option>
            <option value="空">空</option>
        </select>
        槓桿: <input type="number" id="leverage" placeholder="例如 75">
    </div>
    <div class="form-row">
        進場價: <input type="number" step="any" id="entry" placeholder="進場價">
        止損價: <input type="number" step="any" id="stoploss" placeholder="止損價">
        止損理由: <input type="text" id="stoplossReason" placeholder="止損理由">
    </div>
    <div class="form-row">
        止盈價: <input type="text" id="takeprofit" placeholder="止盈（可多個 TP1/TP2）">
        止盈理由: <input type="text" id="takeprofitReason" placeholder="止盈理由">
        投入資金比例: <input type="number" id="capitalRatio" placeholder="0-100%" step="any">
    </div>
    <button onclick="addTrade()">新增交易</button>
</div>

<h2>交易紀錄</h2>
<table id="tradeTable">
    <thead>
        <tr>
            <th>編號</th>
            <th>幣種/合約</th>
            <th>方向</th>
            <th>槓桿</th>
            <th>進場價</th>
            <th>止損價</th>
            <th>止損理由</th>
            <th>止盈價</th>
            <th>止盈理由</th>
            <th>投入資金(USDT)</th>
            <th>結果</th>
            <th>帳戶資金(USDT)</th>
        </tr>
    </thead>
    <tbody>
    </tbody>
</table>

<script>
let accountBalance = 61.59; // 初始帳戶資金
let tradeCount = 0;

function addTrade() {
    const symbol = document.getElementById("symbol").value;
    const side = document.getElementById("side").value;
    const leverage = parseFloat(document.getElementById("leverage").value);
    const entry = parseFloat(document.getElementById("entry").value);
    const stoploss = parseFloat(document.getElementById("stoploss").value);
    const stoplossReason = document.getElementById("stoplossReason").value;
    const takeprofit = document.getElementById("takeprofit").value;
    const takeprofitReason = document.getElementById("takeprofitReason").value;
    const capitalRatio = parseFloat(document.getElementById("capitalRatio").value);

    if (!symbol || isNaN(leverage) || isNaN(entry) || isNaN(stoploss) || isNaN(capitalRatio)) {
        alert("請填寫完整資料");
        return;
    }

    // 計算投入資金
    let investedCapital = accountBalance * (capitalRatio / 100);

    tradeCount += 1;
    const tbody = document.getElementById("tradeTable").getElementsByTagName("tbody")[0];

    const row = tbody.insertRow();
    row.innerHTML = `
        <td>${tradeCount}</td>
        <td>${symbol}</td>
        <td>${side}</td>
        <td>${leverage}</td>
        <td>${entry}</td>
        <td>${stoploss}</td>
        <td>${stoplossReason}</td>
        <td>${takeprofit}</td>
        <td>${takeprofitReason}</td>
        <td>${investedCapital.toFixed(4)}</td>
        <td>進行中</td>
        <td>${accountBalance.toFixed(4)}</td>
    `;

    // 自動更新帳戶資金：扣除已投入資金
    accountBalance -= investedCapital;
    document.getElementById("symbol").value = "";
    document.getElementById("leverage").value = "";
    document.getElementById("entry").value = "";
    document.getElementById("stoploss").value = "";
    document.getElementById("stoplossReason").value = "";
    document.getElementById("takeprofit").value = "";
    document.getElementById("takeprofitReason").value = "";
    document.getElementById("capitalRatio").value = "";
}
</script>

</body>
</html>
