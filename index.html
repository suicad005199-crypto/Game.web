<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto Contract Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --slate-blue: #708090;
            --bg-color: #f4f7f9;
        }
        body {
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding-bottom: 80px; /* 留給底部選單 */
        }
        .safe-area-inset { padding-top: env(safe-area-inset-top); }
        .card-shadow { box-shadow: 0 4px 12px rgba(112, 128, 144, 0.1); }
        .btn-slate { background-color: var(--slate-blue); color: white; }
        .tab-active { border-bottom: 3px solid var(--slate-blue); color: var(--slate-blue); font-weight: bold; }
    </style>
</head>
<body>

    <header class="bg-[#708090] text-white p-6 rounded-b-[30px] shadow-lg safe-area-inset">
        <p class="text-sm opacity-80">總權益 (USDT)</p>
        <h1 class="text-3xl font-bold mt-1">12,450.82</h1>
        <div class="flex mt-4 space-x-4">
            <div>
                <p class="text-xs opacity-70">未實現盈虧</p>
                <p class="text-green-300 font-medium">+420.15 (+3.4%)</p>
            </div>
        </div>
    </header>

    <nav class="flex justify-around bg-white mt-4 border-b">
        <button class="py-3 px-6 tab-active">當前持倉</button>
        <button class="py-3 px-6 text-gray-400">歷史紀錄</button>
    </nav>

    <main class="p-4 space-y-4">
        
        <div class="bg-white p-4 rounded-2xl card-shadow border-l-4 border-green-500">
            <div class="flex justify-between items-start mb-2">
                <div>
                    <span class="font-bold text-lg">BTCUSDT</span>
                    <span class="ml-2 text-xs bg-green-100 text-green-600 px-2 py-0.5 rounded">做多 20x</span>
                </div>
                <button class="text-gray-400 text-sm">平倉</button>
            </div>
            <div class="grid grid-cols-2 gap-y-2 text-sm">
                <div class="text-gray-500">開倉價格: <span class="text-gray-900">42,500.0</span></div>
                <div class="text-gray-500 text-right">標記價格: <span class="text-gray-900">43,210.5</span></div>
                <div class="text-gray-500">盈虧 (USDT): <span class="text-green-500 font-bold">+150.20</span></div>
                <div class="text-gray-500 text-right">回報率: <span class="text-green-500 font-bold">+35.2%</span></div>
            </div>
        </div>

        <div class="bg-white p-4 rounded-2xl card-shadow border-l-4 border-red-500">
            <div class="flex justify-between items-start mb-2">
                <div>
                    <span class="font-bold text-lg">ETHUSDT</span>
                    <span class="ml-2 text-xs bg-red-100 text-red-600 px-2 py-0.5 rounded">做空 10x</span>
                </div>
                <button class="text-gray-400 text-sm">平倉</button>
            </div>
            <div class="grid grid-cols-2 gap-y-2 text-sm">
                <div class="text-gray-500">開倉價格: <span class="text-gray-900">2,300.5</span></div>
                <div class="text-gray-500 text-right">標記價格: <span class="text-gray-900">2,350.2</span></div>
                <div class="text-gray-500">盈虧 (USDT): <span class="text-red-500 font-bold">-45.80</span></div>
                <div class="text-gray-500 text-right">回報率: <span class="text-red-500 font-bold">-19.4%</span></div>
            </div>
        </div>

    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around items-center py-3 px-2 pb-6 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
        <div class="flex flex-col items-center text-slate-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span class="text-[10px] mt-1">資產</span>
        </div>
        <button class="btn-slate px-8 py-3 rounded-full font-bold shadow-md -mt-10 border-4 border-[#f4f7f9]">
            + 新增交易
        </button>
        <div class="flex flex-col items-center text-gray-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
            <span class="text-[10px] mt-1">設定</span>
        </div>
    </footer>

</body>
</html>
