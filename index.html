<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>翻倉交易紀錄 v2</title>
<style>
    body { font-family: Arial, sans-serif; margin: 0; background-color: #000; color: #FFA500; padding: 10px; }
    h2 { text-align: center; color: #FFA500; }
    input, select, button { padding: 10px; margin: 5px 0; border-radius: 6px; border: none; font-size: 16px; }
    input, select { width: 100%; box-sizing: border-box; }
    button { background-color: #FFA500; color: #000; font-weight: bold; cursor: pointer; width: 100%; }
    button:hover { opacity: 0.9; }
    
    .form-row { display: flex; flex-direction: column; margin-bottom: 10px; }
    @media(min-width: 600px){ .form-row { flex-direction: row; gap: 10px; } }

    table { border-collapse: collapse; width: 100%; margin-top: 20px; font-size: 14px; }
    thead { background-color: #222; }
    th, td { border: 1px solid #FFA500; padding: 6px; text-align: center; color: #FFA500; }
    tbody tr:nth-child(even) { background-color: #111; }
    tbody tr:nth-child(odd) { background-color: #000; }
    
    .table-wrapper { overflow-x: auto; }
</style>
</head>
<body>

<h2>翻倉交易紀錄 v2</h2>

<div id="form">
    <div class="form-row">
        <input type="text" id="symbol" placeholder="幣種/合約 (例如 AAVEUSDT.P)">
        <select id="side">
            <option value="多">多</option>
            <option value="空">空</option>
        </select>
        <input type="number" id="leverage" placeholder="槓桿 (例如 75)">
    </div>
    <div class="form-row">
        <input type="number" step="any" id="entry" placeholder="進場價">
        <input type="number" step="any" id="stoploss" placeholder="止損價">
        <input type="text" id="takeprofit" placeholder="止盈價 (可多個 TP1/TP2)">
    </div>
    <div class="form-row">
        <input type="number" id="capitalRatio" placeholder="投入資金比例 0-100%" step="any">
    </div>
    <button onclick="addTrade()">新增交易</button>
</div>

<div class="table-wrapper">
<table id="tradeTable">
    <thead>
        <tr>
            <th>編號</th>
            <th>幣種/合約</th>
            <th>方向</th>
            <th>槓桿</th>
            <th>進場價</th>
            <th>止損價</th>
            <th>止盈價</th>
            <th>投入資金(USDT)</th>
            <th>狀態</th>
            <th>實際盈虧</th>
            <th>帳戶資金(USDT)</th>
        </tr>
    </thead>
    <tbody>
    </tbody>
</table>
</div>

<script>
let accountBalance = 61.59; // 初始帳戶資金
let tradeCount = 0;

function addTrade() {
    const symbol = document.getElementById("symbol").value.trim();
    const side = document.getElementById("side").value;
    const leverage = parseFloat(document.getElementById("leverage").value);
    const entry = parseFloat(document.getElementById("entry").value);
    const stoploss = parseFloat(document.getElementById("stoploss").value);
    const takeprofit = document.getElementById("takeprofit").value.trim();
    const capitalRatio = parseFloat(document.getElementById("capitalRatio").value);

    if (!symbol || isNaN(leverage) || isNaN(entry) || isNaN(stoploss) || isNaN(capitalRatio)) {
        alert("請填寫完整資料");
        return;
    }

    let investedCapital = accountBalance * (capitalRatio / 100);

    tradeCount += 1;
    const tbody = document.getElementById("tradeTable").getElementsByTagName("tbody")[0];

    const row = tbody.insertRow();
    row.innerHTML = `
        <td>${tradeCount}</td>
        <td>${symbol}</td>
        <td>${side}</td>
        <td>${leverage}</td>
        <td>${entry}</td>
        <td>${stoploss}</td>
        <td>${takeprofit}</td>
        <td>${investedCapital.toFixed(4)}</td>
        <td>
            <select onchange="updateStatus(this)">
                <option value="進行中">進行中</option>
                <option value="已結束">已結束</option>
            </select>
        </td>
        <td><input type="number" step="any" placeholder="盈虧" onchange="updateProfit(this)"></td>
        <td>${accountBalance.toFixed(4)}</td>
    `;

    accountBalance -= investedCapital;

    // 清空表單
    document.getElementById("symbol").value = "";
    document.getElementById("leverage").value = "";
    document.getElementById("entry").value = "";
    document.getElementById("stoploss").value = "";
    document.getElementById("takeprofit").value = "";
    document.getElementById("capitalRatio").value = "";
}

// 更新狀態選擇
function updateStatus(select) {
    const row = select.closest("tr");
    const status = select.value;
    if (status === "已結束") {
        const profitInput = row.querySelector("input[type='number']");
        if (profitInput.value) {
            updateProfit(profitInput);
        }
    }
}

// 更新盈虧及帳戶資金
function updateProfit(input) {
    const row = input.closest("tr");
    const profit = parseFloat(input.value);
    if (isNaN(profit)) return;
    const investedCapital = parseFloat(row.cells[7].textContent);
    // 將投入資金返還 + 盈虧
    accountBalance += investedCapital + profit;
    row.cells[10].textContent = accountBalance.toFixed(4);
    input.disabled = true; // 防止重複修改
}
</script>

</body>
</html>
