<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>遊戲大廳</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>
    <header>
        <h1 id="brand-name">載入中...</h1>
    </header>

    <main class="game-grid" id="game-container">
        </main>

    <script>
        async function initLobby() {
            const res = await fetch('./data/games.json');
            const data = await res.json();
            
            document.getElementById('brand-name').textContent = data.meta.brand_name;
            const container = document.getElementById('game-container');

            const html = data.games
                .filter(g => g.is_published)
                .sort((a, b) => a.sort_order - b.sort_order)
                .map(game => `
                    <a href="go.html?game=${game.slug}" class="game-card">
                        <img src="${game.cover_image_url}" class="card-image">
                        <div class="card-info">
                            <span class="card-title">${game.title}</span>
                            <span class="card-tag">${game.tags[0]}</span>
                        </div>
                    </a>
                `).join('');
            container.innerHTML = html;
        }
        initLobby();
    </script>
</body>
</html>
