<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>星雲娛樂城</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    :root { --gold: #FFD700; --bg: #0d0d0d; --card-bg: #1a1a1a; --text: #fff; --sub: #888; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
    
    /* 頂部導覽列 */
    header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #333; position: sticky; top: 0; background: var(--bg); z-index: 100; }
    header h1 { margin: 0; color: var(--gold); font-size: 1.2rem; }
    .icon-btn { background: none; border: none; color: var(--gold); font-size: 24px; cursor: pointer; padding: 0; }
    .login-btn { background: var(--gold); color: #000; border: none; padding: 6px 14px; border-radius: 16px; font-weight: bold; cursor: pointer; }
    
    /* 側邊欄與遮罩 */
    .sidebar { position: fixed; top: 0; left: -250px; width: 250px; height: 100%; background: var(--card-bg); z-index: 1000; transition: left 0.3s ease; box-shadow: 2px 0 5px rgba(0,0,0,0.5); }
    .sidebar.open { left: 0; }
    .sidebar-header { display: flex; justify-content: space-between; padding: 15px 20px; border-bottom: 1px solid #333; align-items: center; }
    .sidebar-header h2 { margin: 0; color: var(--gold); font-size: 18px; }
    .cat-list { list-style: none; padding: 0; margin: 0; }
    .cat-list li { padding: 15px 20px; border-bottom: 1px solid #333; cursor: pointer; color: var(--text); transition: background 0.2s; }
    .cat-list li:active { background: #333; }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; display: none; }
    .overlay.show { display: block; }

    /* 網格與卡片 */
    .container { padding: 15px; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
    .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid #2a2a2a; cursor: pointer; transition: transform 0.2s; }
    .card:active { transform: scale(0.95); }
    .card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
    .card-info { padding: 10px; text-align: center; }
    .card-title { color: var(--gold); font-size: 14px; margin: 0 0 4px; }
    .card-desc { font-size: 11px; color: var(--sub); margin: 0; }
    .loading, .empty { text-align: center; padding: 50px; color: var(--gold); grid-column: 1/-1; }
  </style>
</head>
<body>
  <header>
    <button id="menu-btn" class="icon-btn">☰</button>
    <h1>星雲娛樂城</h1>
    <button id="login-btn" class="login-btn">登入</button>
  </header>

  <div id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <h2>遊戲分類</h2>
      <button id="close-btn" class="icon-btn">✕</button>
    </div>
    <ul class="cat-list">
      <li onclick="loadCategory('')">全部遊戲</li>
      <li onclick="loadCategory('poker')">撲克</li>
      <li onclick="loadCategory('slot')">老虎機</li>
      <li onclick="loadCategory('general')">一般</li>
    </ul>
  </div>
  <div id="overlay" class="overlay"></div>

  <div class="container">
    <div id="game-grid" class="grid"><div class="loading">載入中...</div></div>
  </div>

  <script src="/js/api.js"></script>
</body>
</html>
