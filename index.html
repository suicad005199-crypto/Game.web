<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>翻倉交易管理</title>
<style>
    body { font-family: Arial, sans-serif; margin: 0; background-color: #f5f5f5; color: #333; padding: 10px; }
    h2 { text-align: center; color: #ff6600; }
    input, select, button { padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; }
    button { background-color: #ff6600; color: #fff; border: none; font-weight: bold; cursor: pointer; }
    button:hover { opacity: 0.9; }

    .card { background: #fff; border-radius: 12px; padding: 12px; margin-bottom: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .card-body { display: flex; flex-direction: column; gap: 6px; }
    .card-body input, .card-body select { width: 100%; box-sizing: border-box; }

    .form-row { display: flex; flex-direction: column; margin-bottom: 10px; gap: 5px; }
    @media(min-width: 600px){ .form-row { flex-direction: row; gap: 10px; } }

    .tp-inputs { display: flex; flex-direction: column; gap: 5px; }
    @media(min-width: 500px){ .tp-inputs { flex-direction: row; gap: 10px; } }

    #balance { font-size: 18px; font-weight: bold; text-align: center; margin-bottom: 12px; }
</style>
</head>
<body>

<h2>翻倉交易管理</h2>
<div id="balance">帳戶資金: 61.5900 USDT</div>

<div id="form">
    <div class="form-row">
        <input type="text" id="symbol" placeholder="幣種/合約 (例如 AAVEUSDT.P)">
        <select id="side">
            <option value="多">多</option>
            <option value="空">空</option>
        </select>
        <input type="number" id="leverage" placeholder="槓桿">
    </div>
    <div class="form-row">
        <input type="number" step="any" id="entry" placeholder="進場價">
        <input type="number" step="any" id="stoploss" placeholder="止損價">
    </div>
    <div class="tp-inputs">
        <input type="number" step="any" id="tp1" placeholder="TP1">
        <input type="number" step="any" id="tp2" placeholder="TP2">
        <input type="number" step="any" id="tp3" placeholder="TP3">
    </div>
    <div class="form-row">
        <input type="number" id="capitalRatio" placeholder="投入資金比例 0-100%" step="any">
    </div>
    <button onclick="addTrade()">新增交易</button>
</div>

<div id="tradeList"></div>

<script>
let accountBalance = 61.59;
let tradeCount = 0;

function updateBalanceDisplay() {
    document.getElementById("balance").textContent = `帳戶資金: ${accountBalance.toFixed(4)} USDT`;
}

function addTrade() {
    const symbol = document.getElementById("symbol").value.trim();
    const side = document.getElementById("side").value;
    const leverage = parseFloat(document.getElementById("leverage").value);
    const entry = parseFloat(document.getElementById("entry").value);
    const stoploss = parseFloat(document.getElementById("stoploss").value);
    const tp1 = parseFloat(document.getElementById("tp1").value);
    const tp2 = parseFloat(document.getElementById("tp2").value);
    const tp3 = parseFloat(document.getElementById("tp3").value);
    const capitalRatio = parseFloat(document.getElementById("capitalRatio").value);

    if (!symbol || isNaN(leverage) || isNaN(entry) || isNaN(stoploss) || isNaN(capitalRatio)) {
        alert("請填寫完整資料");
        return;
    }

    let investedCapital = accountBalance * (capitalRatio / 100);
    accountBalance -= investedCapital;
    updateBalanceDisplay();
    tradeCount += 1;

    const tradeList = document.getElementById("tradeList");

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
        <div class="card-header">
            <div><strong>#${tradeCount} ${symbol}</strong> | ${side} | ${leverage}X</div>
            <select onchange="updateStatus(this)">
                <option value="進行中">進行中</option>
                <option value="已結束">已結束</option>
            </select>
        </div>
        <div class="card-body">
            <div>進場價: ${entry} | 止損: ${stoploss}</div>
            <div class="tp-inputs">
                <input type="number" step="any" placeholder="TP1盈虧" onchange="updateTP(this, ${investedCapital})">
                <input type="number" step="any" placeholder="TP2盈虧" onchange="updateTP(this, ${investedCapital})">
                <input type="number" step="any" placeholder="TP3盈虧" onchange="updateTP(this, ${investedCapital})">
            </div>
            <div>投入資金: ${investedCapital.toFixed(4)} USDT</div>
        </div>
    `;
    tradeList.appendChild(card);

    // 清空表單
    ["symbol","leverage","entry","stoploss","tp1","tp2","tp3","capitalRatio"].forEach(id => document.getElementById(id).value = "");
}

function updateStatus(select) {
    const card = select.closest(".card");
    const status = select.value;
    if (status === "已結束") {
        const inputs = card.querySelectorAll(".tp-inputs input");
        inputs.forEach(input => {
            if (input.value) updateTP(input, parseFloat(card.querySelector("div:contains('投入資金')").textContent.split(":")[1]));
        });
    }
}

function updateTP(input, investedCapital) {
    const profit = parseFloat(input.value);
    if (isNaN(profit)) return;
    accountBalance += profit;
    updateBalanceDisplay();
    input.disabled = true; // 防止重複修改
}
</script>

</body>
</html>
