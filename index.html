<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>星雲遊戲館</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #D4AF37; --dark-bg: #0A0A0A; --card-bg: #1A1A1A; --text-gold: #FFD700; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--dark-bg); font-family: -apple-system, sans-serif; color: #FFF; }

        /* Header */
        header { 
            position: sticky; top: 0; background: rgba(10,10,10,0.8); 
            backdrop-filter: blur(15px); padding: 12px 20px; 
            display: flex; align-items: center; justify-content: space-between;
            z-index: 100; border-bottom: 1px solid rgba(212,175,55,0.3);
        }
        .header-left { display: flex; align-items: center; }
        .menu-btn { border: none; background: none; color: var(--gold); cursor: pointer; padding: 5px; margin-right: 12px; }
        header h1 { margin: 0; font-size: 18px; font-weight: 800; color: var(--text-gold); letter-spacing: 1px; }
        
        /* Login Button */
        .login-btn { 
            background: linear-gradient(135deg, #D4AF37, #F2D06B); color: #000;
            border: none; padding: 6px 16px; border-radius: 20px; font-weight: 700; font-size: 13px;
            box-shadow: 0 0 10px rgba(212,175,55,0.4); cursor: pointer;
        }

        /* Sidebar */
        #sidebar { 
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%; 
            background: #111; z-index: 200; transition: 0.3s; padding: 60px 20px;
            border-right: 1px solid var(--gold);
        }
        #sidebar.open { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 150; display: none; }
        .overlay.show { display: block; }
        .menu-item { display: flex; align-items: center; padding: 15px; color: var(--gold); font-size: 16px; cursor: pointer; }
        .menu-item svg { width: 20px; margin-right: 12px; }

        /* Grid & Cards */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .game-card { 
            background: var(--card-bg); border-radius: 15px; overflow: hidden; 
            border: 1px solid rgba(212,175,55,0.2); transition: 0.2s; text-decoration: none; color: inherit;
        }
        .game-card:active { transform: scale(0.96); border-color: var(--gold); }
        .card-image { width: 100%; aspect-ratio: 4/3; object-fit: cover; filter: brightness(0.8); }
        .card-info { padding: 12px; text-align: center; }
        .card-title { color: var(--text-gold); font-weight: 700; font-size: 15px; margin-bottom: 4px; display: block; }
        .card-desc { font-size: 11px; color: #AAA; }
    </style>
</head>
<body>
    <div class="overlay" onclick="toggleMenu()"></div>
    <nav id="sidebar">
        <div class="menu-item" onclick="filterGames('全部')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg> 財富中心</div>
        <div class="menu-item" onclick="filterGames('熱門')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"></path></svg> 熱門推薦</div>
        <div class="menu-item" onclick="filterGames('撲克')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.5 6.5L22 10l-5 5.5L18.5 22 12 18.5 5.5 22 7 15.5 2 10l6.5-1.5L12 2z"></path></svg> 撲克大賽</div>
    </nav>

    <header>
        <div class="header-left">
            <button class="menu-btn" onclick="toggleMenu()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
            <h1>星雲遊戲館</h1>
        </div>
        <button class="login-btn" onclick="alert('登入系統對接中...')">登入</button>
    </header>

    <main class="game-grid" id="game-container"></main>

    <script>
        const SUPABASE_URL = 'https://hanyrygfyalbcdmeodyv.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_qI3Gfqt6tRG9whlmsl1oqA_ZaBndPN4';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let allGames = [];

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.querySelector('.overlay').classList.toggle('show');
        }

        async function fetchGames() {
            const { data, error } = await supabaseClient.from('games').select('*').eq('is_published', true).order('sort_order');
            if (!error) { allGames = data; renderGames(allGames); }
        }

        function renderGames(list) {
            document.getElementById('game-container').innerHTML = list.map(game => `
                <a href="go.html?game=${game.slug}" class="game-card">
                    <img src="${game.cover_image_url}" class="card-image">
                    <div class="card-info">
                        <span class="card-title">${game.title}</span>
                        <span class="card-desc">${game.description}</span>
                    </div>
                </a>
            `).join('');
        }

        function filterGames(tag) {
            toggleMenu();
            renderGames(tag === '全部' ? allGames : allGames.filter(g => g.tags?.includes(tag)));
        }
        fetchGames();
    </script>
</body>
</html>
