<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>星雲遊戲館</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    :root { 
      --gold: #FFD700; 
      --bg: #0d0d0d; 
      --card-bg: #1a1a1a; 
      --text: #ffffff; 
      --sub-text: #888888; 
    }
    body { 
      margin: 0; background: var(--bg); color: var(--text); 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      -webkit-tap-highlight-color: transparent; 
    }
    header { 
      display: flex; justify-content: space-between; align-items: center; 
      padding: 16px 20px; border-bottom: 1px solid #333; 
    }
    header h1 { margin: 0; color: var(--gold); font-size: 20px; font-weight: 800; letter-spacing: 1px; }
    .login-btn { 
      background: var(--gold); color: #000; border: none; 
      padding: 8px 18px; border-radius: 20px; font-weight: bold; font-size: 14px;
    }
    .container { padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .card { 
      background: var(--card-bg); border-radius: 16px; overflow: hidden; 
      border: 1px solid #2a2a2a; transition: transform 0.15s ease; cursor: pointer;
    }
    .card:active { transform: scale(0.96); }
    .card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; border-bottom: 1px solid #2a2a2a; }
    .card-info { padding: 12px; text-align: center; }
    .card-title { color: var(--gold); font-size: 15px; font-weight: bold; margin: 0 0 6px 0; }
    .card-desc { color: var(--sub-text); font-size: 11px; margin: 0; }
    .loading { grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--gold); }
  </style>
</head>
<body>
  <header>
    <h1>星雲遊戲館</h1>
    <button class="login-btn">登入</button>
  </header>
  <div class="container">
    <div id="game-grid" class="grid">
      <div class="loading">遊戲載入中...</div>
    </div>
  </div>
  <script src="/js/api.js"></script>
</body>
</html>
