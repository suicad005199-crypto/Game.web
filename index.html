<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Crypto Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --slate-blue: #708090; }
        body { background-color: #f1f5f9; font-family: -apple-system, sans-serif; padding-bottom: 100px; }
        .slate-bg { background-color: var(--slate-blue); }
        .slate-text { color: var(--slate-blue); }
        .modal { display: none; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
        .modal.active { display: flex; }
        input, select { -webkit-appearance: none; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>

    <header class="slate-bg text-white p-6 rounded-b-[35px] shadow-lg sticky top-0 z-10">
        <p class="text-xs opacity-80">總權益 (USDT)</p>
        <h1 id="totalDisplay" class="text-3xl font-bold mt-1">0.00</h1>
        <div class="mt-2 text-xs opacity-70">初始資金: <span id="initFundDisplay">0.00</span></div>
    </header>

    <main id="tradeList" class="p-4 space-y-3"></main>

    <div id="tradeModal" class="modal fixed inset-0 z-50 items-end">
        <div class="bg-white w-full rounded-t-[30px] p-6 shadow-2xl">
            <h2 id="modalTitle" class="text-lg font-bold slate-text mb-4">新增交易</h2>
            <input type="hidden" id="editIndex">
            <div class="space-y-3">
                <div class="flex gap-2">
                    <input id="symbol" type="text" placeholder="幣種" class="w-full p-4 rounded-xl bg-gray-50">
                    <select id="side" class="p-4 rounded-xl bg-gray-50">
                        <option value="Long">做多</option>
                        <option value="Short">做空</option>
                    </select>
                </div>
                <div class="flex gap-2">
                    <input id="lev" type="number" placeholder="槓桿" class="w-1/3 p-4 rounded-xl bg-gray-50">
                    <input id="margin" type="number" placeholder="保證金" class="w-2/3 p-4 rounded-xl bg-gray-50">
                </div>
                <input id="entry" type="number" placeholder="開倉價格" class="w-full p-4 rounded-xl bg-gray-50">
            </div>
            <div class="flex gap-3 mt-6">
                <button onclick="closeModal('tradeModal')" class="flex-1 py-4 text-gray-400 font-medium">取消</button>
                <button onclick="saveTrade()" class="flex-[2] slate-bg text-white py-4 rounded-2xl font-bold shadow-lg">儲存紀錄</button>
            </div>
        </div>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around items-center py-3 pb-8 px-6 shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
        <button onclick="setInitialFund()" class="flex flex-col items-center slate-text">
            <div class="p-1">📁</div>
            <span class="text-[10px] font-bold">資產清單</span>
        </button>
        
        <button onclick="openTradeModal()" class="slate-bg text-white w-14 h-14 rounded-full flex items-center justify-center shadow-xl -mt-12 border-[6px] border-[#f1f5f9]">
            <span class="text-2xl">+</span>
        </button>

        <button onclick="location.reload()" class="flex flex-col items-center text-gray-400">
            <div class="p-1">🔄</div>
            <span class="text-[10px] font-bold">同步</span>
        </button>
    </footer>

    <script>
        let state = JSON.parse(localStorage.getItem('crypto_data')) || { initial: 0, trades: [] };

        function render() {
            const list = document.getElementById('tradeList');
            list.innerHTML = state.trades.length ? '' : '<p class="text-center text-gray-400 mt-10">尚無紀錄</p>';
            
            state.trades.forEach((t, i) => {
                const color = t.side === 'Long' ? 'green' : 'red';
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-${color}-500 flex justify-between items-center">
                        <div onclick="editTrade(${i})" class="flex-1">
                            <div class="flex items-center gap-2">
                                <span class="font-bold text-gray-800">${t.symbol}</span>
                                <span class="text-[10px] bg-${color}-100 text-${color}-600 px-2 py-0.5 rounded-full font-bold">${t.side} ${t.lev}x</span>
                            </div>
                            <div class="text-xs text-gray-400 mt-1">開倉: ${t.entry} | 保證金: ${t.margin}</div>
                        </div>
                        <button onclick="deleteTrade(${i})" class="text-gray-300 ml-4 text-sm">刪除</button>
                    </div>`;
            });

            document.getElementById('initFundDisplay').innerText = state.initial.toFixed(2);
            document.getElementById('totalDisplay').innerText = (state.initial + state.trades.reduce((a, b) => a + Number(b.margin), 0)).toFixed(2);
            localStorage.setItem('crypto_data', JSON.stringify(state));
        }

        function setInitialFund() {
            const val = prompt("輸入初始資金 (USDT):", state.initial);
            if (val !== null) { state.initial = Number(val); render(); }
        }

        function openTradeModal() {
            document.getElementById('editIndex').value = "";
            document.getElementById('modalTitle').innerText = "新增交易";
            ['symbol', 'entry', 'lev', 'margin'].forEach(id => document.getElementById(id).value = "");
            document.getElementById('tradeModal').classList.add('active');
        }

        function editTrade(i) {
            const t = state.trades[i];
            document.getElementById('editIndex').value = i;
            document.getElementById('modalTitle').innerText = "編輯紀錄";
            document.getElementById('symbol').value = t.symbol;
            document.getElementById('side').value = t.side;
            document.getElementById('lev').value = t.lev;
            document.getElementById('margin').value = t.margin;
            document.getElementById('entry').value = t.entry;
            document.getElementById('tradeModal').classList.add('active');
        }

        function saveTrade() {
            const data = {
                symbol: document.getElementById('symbol').value.toUpperCase(),
                side: document.getElementById('side').value,
                lev: document.getElementById('lev').value,
                margin: document.getElementById('margin').value,
                entry: document.getElementById('entry').value
            };
            const idx = document.getElementById('editIndex').value;
            if (idx === "") state.trades.unshift(data);
            else state.trades[idx] = data;
            closeModal('tradeModal');
            render();
        }

        function deleteTrade(i) { if(confirm('確定刪除？')) { state.trades.splice(i, 1); render(); } }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        render();
    </script>
</body>
</html>
