<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>安全跳轉中</title>
<style>
    body {margin:0;padding:0;display:flex;align-items:center;justify-content:center;height:100vh;background-color:#F2F2F7;font-family:-apple-system,system-ui,sans-serif;}
    .container {width:85%;max-width:320px;background:#fff;padding:30px 20px;border-radius:20px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,0.08);}
    .loading-spinner {width:40px;height:40px;border:3px solid #E5E5EA;border-top:3px solid #007AFF;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px;}
    @keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
    h3{margin:10px 0;font-size:20px;}
    p{color:#8E8E93;font-size:14px;line-height:1.5;}
    .btn{display:block;margin-top:25px;padding:14px;background:#007AFF;color:white;text-decoration:none;border-radius:12px;font-weight:600;}
</style>
</head>
<body>
<div class="container" id="app">
    <div class="loading-spinner"></div>
    <p>正在驗證遊戲連結...</p>
</div>
<script>
async function secureRedirect() {
    const params = new URLSearchParams(location.search);
    const slug = params.get('game');
    const app = document.getElementById('app');

    if (!slug) return;

    try {
        // 改成 fetch Worker API
        const res = await fetch(`https://your-worker-domain.com?game=${slug}`);
        const data = await res.json();

        if (data.error) {
            app.innerHTML = `<h3 style="color:#FF3B30">連結無效</h3>
                             <p>${data.error}</p>
                             <a href="index.html" class="btn">返回大廳</a>`;
            return;
        }

        const url = atob(data.url);
        const domain = new URL(url).hostname;

        app.innerHTML = `
            <h3>即將前往</h3>
            <p><strong>${slug}</strong><br>目標網域：${domain}</p>
            <a href="${url}" rel="noopener noreferrer" class="btn">確認進入</a>
        `;
    } catch (e) {
        app.innerHTML = `<h3>系統錯誤</h3>
                         <p>請稍後再試</p>
                         <a href="index.html" class="btn">返回大廳</a>`;
    }
}

secureRedirect();
</script>
</body>
</html>
