<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全檢查</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { display: flex; align-items: center; justify-content: center; height: 100vh; background: #F2F2F7; font-family: sans-serif; text-align: center; }
        .btn { display: inline-block; margin-top: 20px; padding: 12px 24px; background: #007AFF; color: #FFF; text-decoration: none; border-radius: 10px; font-weight: 600; }
    </style>
</head>
<body>
    <div id="app">正在驗證...</div>
    <script>
        const SUPABASE_URL = https://hanyrygfyalbcdmeodyv.supabase.co;
        const SUPABASE_KEY = sb_publishable_qI3Gfqt6tRG9whlmsl1oqA_ZaBndPN4;
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function verify() {
            const slug = new URLSearchParams(location.search).get('game');
            const { data: game } = await supabaseClient.from('games').select('*').eq('slug', slug).single();

            if (game && game.is_published) {
                document.getElementById('app').innerHTML = `
                    <h3>即將前往 ${game.title}</h3>
                    <a href="${game.target_url}" class="btn">確認進入</a>
                `;
            } else {
                document.getElementById('app').innerHTML = `<h3>連結無效</h3><a href="index.html">返回</a>`;
            }
        }
        verify();
    </script>
</body>
</html>
