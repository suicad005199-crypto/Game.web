<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全檢查中 - 星雲遊戲館</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        /* 黑金奢華風格背景與佈局 */
        body { 
            margin: 0; 
            background: #0A0A0A; 
            color: #D4AF37; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }
        /* 中間的驗證卡片 */
        .box { 
            background: #1A1A1A; 
            padding: 40px; 
            border-radius: 20px; 
            border: 1px solid rgba(212, 175, 55, 0.5); 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 85%;
            max-width: 400px;
        }
        /* 金屬感按鈕樣式 */
        .btn { 
            display: block; 
            margin-top: 25px; 
            padding: 15px; 
            background: linear-gradient(135deg, #D4AF37, #F2D06B); 
            color: #000; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: 800; 
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.95); }
        /* 載入動畫 */
        .loader {
            border: 3px solid rgba(212, 175, 55, 0.1);
            border-top: 3px solid #D4AF37;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="box" id="app">
        <div class="loader"></div>
        <p>正在建立安全加密通道...</p>
    </div>

    <script>
        // 請務必替換為您自己的 URL 與 KEY
        const SUPABASE_URL = 'https://hanyrygfyalbcdmeodyv.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_qI3Gfqt6tRG9whlmsl1oqA_ZaBndPN4';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function verifyAndRedirect() {
            // 從網址列取得遊戲 slug (例如: go.html?game=blackjack)
            const params = new URLSearchParams(location.search);
            const slug = params.get('game');

            if (!slug) {
                location.href = 'index.html';
                return;
            }

            // 向資料庫查詢該遊戲資訊
            const { data: game, error } = await supabaseClient
                .from('games')
                .select('*')
                .eq('slug', slug)
                .single();

            // 檢查遊戲是否存在且已上架
            if (game && game.is_published) {
                document.getElementById('app').innerHTML = `
                    <h2 style="margin-top:0; color:#FFD700;">${game.title}</h2>
                    <p style="color:#AAA;">帳號驗證成功，點擊下方按鈕進入遊戲</p>
                    <a href="${game.target_url}" class="btn">立即贏取財富</a>
                `;
            } else {
                document.getElementById('app').innerHTML = `
                    <h2 style="color:#FF4500;">連結已失效</h2>
                    <p>該遊戲目前維護中，請稍後再試。</p>
                    <a href="index.html" style="color:#D4AF37; text-decoration:none;">返回大廳</a>
                `;
            }
        }

        // 執行驗證邏輯
        verifyAndRedirect();
    </script>
</body>
</html>
