<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow">
    <title>安全檢查中</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; background: #F2F2F7; font-family: -apple-system, system-ui, sans-serif; }
        .container { width: 85%; max-width: 320px; background: #FFF; padding: 30px 20px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .spinner { width: 40px; height: 40px; border: 3px solid #E5E5EA; border-top: 3px solid #007AFF; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        h3 { margin: 10px 0; font-size: 20px; }
        p { color: #8E8E93; font-size: 14px; line-height: 1.5; }
        .btn { display: block; margin-top: 25px; padding: 14px; background: #007AFF; color: #FFF; text-decoration: none; border-radius: 12px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="spinner"></div>
        <p>正在驗證安全連結...</p>
    </div>

    <script>
        const SUPABASE_URL = https://hanyrygfyalbcdmeodyv.supabase.co;
        const SUPABASE_KEY = sb_publishable_qI3Gfqt6tRG9whlmsl1oqA_ZaBndPN4;
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function verify() {
            const slug = new URLSearchParams(location.search).get('game');
            const app = document.getElementById('app');

            const { data: game, error } = await supabaseClient
                .from('games')
                .select('*')
                .eq('slug', slug)
                .single();

            if (game && game.is_published) {
                if (!game.target_url.startsWith('https://')) {
                    app.innerHTML = `<h3 style="color:#FF3B30">安全阻擋</h3><p>目標網址不安全 (非 HTTPS)</p><a href="index.html" class="btn">返回大廳</a>`;
                    return;
                }
                const domain = new URL(game.target_url).hostname;
                app.innerHTML = `
                    <h3>即將前往</h3>
                    <p><strong>${game.title}</strong><br>目標網域：${domain}</p>
                    <a href="${game.target_url}" rel="noopener noreferrer" class="btn">確認進入</a>
                `;
            } else {
                app.innerHTML = `<h3 style="color:#FF3B30">連結無效</h3><p>遊戲已下架或網址錯誤</p><a href="index.html" class="btn" style="background:#8E8E93">返回大廳</a>`;
            }
        }
        verify();
    </script>
</body>
</html>
