<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>安全驗證中</title>
<style>
body { font-family:-apple-system; display:flex; align-items:center; justify-content:center; height:100vh; background:#F2F2F7;}
.box { background:#fff; padding:30px; border-radius:16px; text-align:center; width:300px;}
button { padding:12px; width:100%; background:#007AFF; border:none; color:#fff; border-radius:10px;}
</style>
</head>
<body>

<div class="box" id="app">
<p>驗證中...</p>
</div>

<script>
async function redirectGame(){
    const slug = new URLSearchParams(location.search).get('game');
    const app = document.getElementById('app');

    if(!slug){
        app.innerHTML = "<p>參數錯誤</p>";
        return;
    }

    try{
        const res = await fetch('/api/redirect', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ slug })
        });

        const data = await res.json();

        if(data.success){
            app.innerHTML = `
                <p>即將前往 ${data.title}</p>
                <button onclick="location.href='${data.redirect_url}'">確認進入</button>
            `;
        }else{
            app.innerHTML = "<p>遊戲不可用</p>";
        }
    }catch(e){
        app.innerHTML = "<p>系統錯誤</p>";
    }
}
redirectGame();
</script>

</body>
</html>
