<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>安全驗證中</title>
<style>
body{font-family:-apple-system;display:flex;align-items:center;justify-content:center;height:100vh;background:#F2F2F7;}
.box{background:#fff;padding:30px;border-radius:16px;text-align:center;width:320px;}
button{padding:12px;width:100%;background:#007AFF;border:none;color:#fff;border-radius:10px;}
.error{color:#FF3B30;}
</style>
</head>
<body>

<div class="box" id="app">
<p>驗證中...</p>
</div>

<script>
const allowedDomains = [
    "game-star-war.com",
    "game-puzzle-master.com"
];

function base64Decode(str){
    return decodeURIComponent(escape(window.atob(str)));
}

async function secureRedirect(){
    const slug = new URLSearchParams(location.search).get('game');
    const app = document.getElementById('app');

    if(!slug){
        app.innerHTML="<p class='error'>參數錯誤</p>";
        return;
    }

    try{
        const res = await fetch('./data/targets.json');
        const targets = await res.json();

        if(!targets[slug]){
            app.innerHTML="<p class='error'>遊戲不存在</p>";
            return;
        }

        const url = base64Decode(targets[slug]);

        if(!url.startsWith("https://")){
            app.innerHTML="<p class='error'>不安全連結</p>";
            return;
        }

        const domain = new URL(url).hostname;

        if(!allowedDomains.includes(domain)){
            app.innerHTML="<p class='error'>未授權網域</p>";
            return;
        }

        app.innerHTML=`
            <p>即將前往<br><strong>${domain}</strong></p>
            <button onclick="location.href='${url}'">確認進入</button>
        `;

    }catch(e){
        app.innerHTML="<p class='error'>系統錯誤</p>";
    }
}

secureRedirect();
</script>

</body>
</html>
