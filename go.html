<script>
async function secureRedirect() {
    const params = new URLSearchParams(location.search);
    const slug = params.get('game');
    const app = document.getElementById('app');
    
    // 前端測試用 secret_key（正式環境建議用 Worker 生成 HMAC）
    const secret_key = 'my_test_secret_key';

    try {
        const res = await fetch('./targets.json');
        const data = await res.json();
        const targetData = data[slug];

        if (!targetData) {
            app.innerHTML = `<h3 style="color:#FF3B30">連結無效</h3>
                             <p>找不到該遊戲或已下架</p>
                             <a href="index.html" class="btn">返回大廳</a>`;
            return;
        }

        const url = atob(targetData.url); // Base64 decode
        const signature = targetData.signature;

        // HMAC 驗證
        const enc = new TextEncoder();
        const key = await crypto.subtle.importKey(
            'raw',
            enc.encode(secret_key),
            { name: 'HMAC', hash: 'SHA-256' },
            false,
            ['verify']
        );

        const sigBuffer = Uint8Array.from(signature.match(/.{2}/g).map(b => parseInt(b, 16)));
        const valid = await crypto.subtle.verify(
            'HMAC',
            key,
            sigBuffer,
            enc.encode(url)
        );

        if (!valid) {
            app.innerHTML = `<h3 style="color:#FF3B30">連結無效</h3>
                             <p>HMAC 驗證失敗</p>
                             <a href="index.html" class="btn">返回大廳</a>`;
            return;
        }

        // 強制 HTTPS 檢查
        if (!url.startsWith('https://')) {
            app.innerHTML = `<h3 style="color:#FF3B30">不安全的連結</h3>
                             <p>目標網址非 HTTPS，已阻擋</p>
                             <a href="index.html" class="btn">返回大廳</a>`;
            return;
        }

        const domain = new URL(url).hostname;
        app.innerHTML = `
            <h3>即將前往</h3>
            <p><strong>${slug}</strong><br>目標網域：${domain}</p>
            <a href="${url}" rel="noopener noreferrer" class="btn">確認進入</a>
        `;
    } catch (e) {
        app.innerHTML = `<h3>系統錯誤</h3>
                         <p>請稍後再試</p>
                         <a href="index.html" class="btn">返回大廳</a>`;
    }
}

secureRedirect();
</script>
