<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星雲娛樂城</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .card { background: #222; border-radius: 8px; overflow: hidden; cursor: pointer; text-align: center; }
        .card img { width: 100%; height: 100px; object-fit: cover; }
        .card h3 { font-size: 14px; margin: 10px 0; }
        button { padding: 8px 16px; background: #FFD700; color: #000; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <h1>星雲娛樂城</h1>
        <div>
            <button onclick="login()">登入</button>
            <button onclick="location.href='looty-me.html'">個人中心</button>
        </div>
    </header>
    <nav style="margin-bottom: 20px;">
        <button onclick="fetchGames('all')">全部</button>
        <button onclick="fetchGames('slot')">老虎機</button>
    </nav>
    <div id="game-grid" class="grid"></div>

    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
</body>
</html>
